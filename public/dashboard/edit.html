<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Editar Produto - BoiStock</title>
    <link rel="stylesheet" href="/dashboard/css/dashboard-style.css">
    <script src="/dashboard/js/theme.js"></script>

</head>

<body>

    <div class="dashboard">

        <aside class="sidebar">
            <div class="profile">
                <div class="avatar">🐂</div>
                <h3>BoiStock</h3>
                <p>Gestão Agropecuária</p>
            </div>

            <nav>
                <a href="/dashboard">🏠 Dashboard</a>
                <a href="/dashboard/products">📦 Produtos</a>
                <a href="/dashboard/settings">⚙️ Configurações</a>
            </nav>
            <div class="theme-switch-wrapper">
                <button id="theme-toggle" class="theme-toggle-btn" title="Alternar Tema">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                </button>
            </div>
        </aside>

        <main class="main-content">

            <div class="page-card">

                <a href="/dashboard/products" class="nav-link">
                    ← Cancelar edição
                </a>

                <h1>Atualizar Produto</h1>

                <div class="form-container">

                    <form id="edit-product-form">
                        <input type="text" id="name" placeholder="Nome do produto" required />
                        <input type="text" id="description" placeholder="Descrição" required />
                        <input type="number" step="0.01" id="price" placeholder="Preço" required />
                        <input type="number" id="quantity" placeholder="Quantidade" required />
                        <button type="submit" class="btn-primary">
                            Salvar Alterações
                        </button>

                        <button type="button" class="cancel-btn" onclick="window.location.href='/dashboard/products'">
                            Descartar
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="/dashboard/js/edit.js"></script>
</body>

</html>

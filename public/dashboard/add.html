<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Produto - BoiStock</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round">
    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
    <link rel="stylesheet" href="/dashboard/css/dashboard-style.css">
    <script src="/dashboard/js/theme.js"></script>

</head>

<body>

    <div class="dashboard">

        <aside class="sidebar">
            <div class="profile">
                <div class="avatar">
                    <img src="/assets/images/image.png"
                        style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                </div>

                <div class="profile-info">
                    <h3>AgroBoi - BoiStock</h3>
                    <p>Gestão Agropecuária</p>
                </div>
            </div>

            <nav>
                <a href="/">
                    <span class="material-icons-round">home</span> Início
                </a>
                <a href="/dashboard">
                    <span class="material-icons-round">dashboard</span> Dashboard</a>
                <a href="/dashboard/products" class="active">
                    <span class="material-icons-round">inventory_2</span> Produtos</a>
                <a href="/dashboard/settings">
                    <span class="material-icons-round">settings</span> Configurações</a>
            </nav>

            <div class="theme-switch-wrapper">
                <button id="theme-toggle" class="theme-toggle-btn" title="Alternar Tema">
                    <span class="material-icons-round icon-sun">light_mode</span>
                    <span class="material-icons-round icon-moon">dark_mode</span>
                </button>
            </div>
        </aside>

        <main class="main-content">

            <div class="page-card">

                <a href="/dashboard/products" class="nav-link">
                    ← Voltar ao Estoque
                </a>

                <h1>Cadastrar Produto</h1>

                <div class="form-container">

                    <form id="add-product-form">
                        <input type="text" id="name" placeholder="Ex: Ração Bovina 50kg" required />
                        <input type="text" id="description" placeholder="Descrição do produto" required />
                        <input type="number" step="0.01" id="price" placeholder="Preço (R$)" required />
                        <input type="number" id="quantity" placeholder="Quantidade em estoque" required />
                        <button type="submit" class="btn-primary">
                            Salvar Produto
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="/dashboard/js/products.js"></script>

</body>

</html>

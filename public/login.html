<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BoiStock</title>
    <link rel="stylesheet" href="/login.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">
                <div class="brand-logo">📦</div>
                <span>BoiStock</span>
            </div>
        </div>
    </nav>

    <main class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h1>Bem-vindo de volta</h1>
                <p>Insira suas credenciais para acessar o sistema.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">E-mail corporativo</label>
                    <input type="email" id="email" class="form-control" placeholder="exemplo@boistock.com.br" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary-lg btn-block">Acessar Sistema</button>
            </form>
            
            <div id="loginError" class="error-message" style="display: none;"></div>
        </div>
    </main>

    <script src="/login.js"></script>
</body>
</html>

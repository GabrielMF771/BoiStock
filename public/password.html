<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trocar Senha - BoiStock</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/login.css">

</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Defina sua nova senha</h2>
            <p>Por questões de segurança, você precisa alterar sua senha temporária.</p>
            <form id="changePasswordForm">
                <div class="input-group">
                    <label for="newPassword">Nova Senha</label>
                    <input type="password" id="newPassword" required>
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirme a Nova Senha</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <button type="submit" class="btn-login">Salvar Nova Senha</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const token = localStorage.getItem('token');

            if (newPassword !== confirmPassword) {
                return alert('As senhas não coincidem!');
            }

            const response = await fetch('/api/change-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ newPassword })
            });

            if (response.ok) {
                alert('Senha atualizada! Por favor, faça login novamente.');
                localStorage.removeItem('token');
                window.location.href = '/login.html';
            } else {
                alert('Erro ao atualizar senha.');
            }
        });
    </script>
</body>

</html>

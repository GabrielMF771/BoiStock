<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trocar Senha - BoiStock</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="stylesheet" href="/login.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">
                <div class="brand-logo">
                    <img src="/assets/images/image.png"
                        style="width: 100%; height: 100%; object-fit: cover; border-radius: 100%;">
                </div>
                <span>AgroBoi - BoiStock</span>
            </div>
        </div>
    </nav>

    <main class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h1>Defina sua nova senha</h1>
                <p>Você está usando uma senha temporária. Crie uma nova para continuar.</p>
            </div>

            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="newPassword">Nova senha</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirme a nova senha</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary-lg btn-block">Salvar nova senha</button>
            </form>

            <div id="msgBox" class="error-message" style="display: none;"></div>
        </div>
    </main>

    <script src="/change-password.js"></script>
</body>

</html>
